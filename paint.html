<div class="xp-paint-app" data-paint-root>
    <div class="xp-menu-strip">
        <button type="button" data-paint-command="new">Nuevo</button>
        <button type="button" data-paint-command="undo">Deshacer</button>
        <button type="button" data-paint-command="redo">Rehacer</button>
        <button type="button" data-paint-command="download">Guardar PNG</button>
    </div>

    <div class="xp-paint-workspace">
        <aside class="xp-paint-tools" aria-label="Herramientas de Paint">
            <button type="button" class="active" data-tool="pencil" title="Lapiz">P</button>
            <button type="button" data-tool="brush" title="Pincel">B</button>
            <button type="button" data-tool="eraser" title="Borrador">E</button>
            <button type="button" data-tool="fill" title="Relleno">F</button>
            <button type="button" data-tool="picker" title="Cuentagotas">I</button>
            <button type="button" data-tool="text" title="Texto">A</button>
            <button type="button" data-tool="line" title="Linea">/</button>
            <button type="button" data-tool="rect" title="Rectangulo">[]</button>
            <button type="button" data-tool="ellipse" title="Elipse">O</button>
            <div class="xp-paint-size">
                <label for="paint-size">Tamano</label>
                <input id="paint-size" type="range" min="1" max="18" value="3" data-paint-size>
            </div>
        </aside>

        <main class="xp-paint-canvas-wrap">
            <canvas id="paintCanvas" width="760" height="460" aria-label="Lienzo de Paint"></canvas>
        </main>
    </div>

    <div class="xp-paint-palette" aria-label="Paleta de colores">
        <div class="xp-paint-current">
            <span data-current-color></span>
            <small>Color</small>
        </div>
        <div class="xp-paint-colors" data-paint-colors></div>
    </div>
    <div class="xp-statusbar"><span data-paint-status>Listo</span><span>Paint XP</span></div>
</div>
