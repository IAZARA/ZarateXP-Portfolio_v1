<div class="xp-minesweeper" data-minesweeper-root>
    <div class="xp-menu-strip">
        <button type="button" data-ms-command="new">Juego</button>
        <button type="button" data-ms-command="help">Ayuda</button>
    </div>

    <div class="xp-minesweeper-shell">
        <div class="xp-minesweeper-options" role="group" aria-label="Dificultad">
            <button type="button" class="active" data-ms-difficulty="beginner">Principiante</button>
            <button type="button" data-ms-difficulty="intermediate">Intermedio</button>
            <button type="button" data-ms-difficulty="expert">Experto</button>
        </div>

        <div class="xp-minesweeper-panel">
            <div class="xp-led" data-ms-mines>010</div>
            <button type="button" class="xp-face" data-ms-reset aria-label="Nuevo juego">:)</button>
            <div class="xp-led" data-ms-timer>000</div>
        </div>

        <div class="xp-board-wrap">
            <div class="xp-board" data-ms-board role="grid" aria-label="Tablero de Buscaminas" aria-describedby="minesweeper-status"></div>
        </div>

        <div id="minesweeper-status" class="xp-minesweeper-status" data-ms-status role="status" aria-live="polite" aria-atomic="true">
            Primer clic seguro. Click derecho para marcar.
        </div>
    </div>
</div>
