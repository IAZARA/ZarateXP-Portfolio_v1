    <path d="M33 205V45a8 8 0 0 1 8-8h170" fill="none" stroke="#fff" stroke-width="7" opacity="0.9"/>
    <path d="M46 90h164M46 145h164M91 49v156M146 49v156" stroke="#a6a39b" stroke-width="3" opacity="0.55"/>

    <g transform="translate(125 133)">
      <g fill="url(#spike)" stroke="#17186d" stroke-width="3">
        <rect x="-12" y="-99" width="24" height="48" rx="10"/>
        <rect x="-12" y="51" width="24" height="48" rx="10"/>
        <rect x="51" y="-12" width="48" height="24" rx="10"/>
        <rect x="-99" y="-12" width="48" height="24" rx="10"/>
        <rect x="-12" y="-99" width="24" height="48" rx="10" transform="rotate(45)"/>
        <rect x="-12" y="51" width="24" height="48" rx="10" transform="rotate(45)"/>
