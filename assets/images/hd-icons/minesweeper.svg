<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Buscaminas XP</title>
  <desc id="desc">Mina tridimensional azul sobre una casilla biselada con una bandera roja.</desc>
  <defs>
    <linearGradient id="tile" x1="30" y1="22" x2="218" y2="228" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbfbf8"/>
      <stop offset="0.34" stop-color="#dedbd1"/>
      <stop offset="1" stop-color="#9d9a91"/>
    </linearGradient>
    <radialGradient id="mine" cx="0" cy="0" r="1" gradientTransform="translate(91 80) rotate(48) scale(122)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f5f5ff"/>
      <stop offset="0.18" stop-color="#b9bdf6"/>
      <stop offset="0.5" stop-color="#5856be"/>
      <stop offset="0.78" stop-color="#26258d"/>
      <stop offset="1" stop-color="#10115a"/>
    </radialGradient>
    <linearGradient id="spike" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#dadcff"/>
      <stop offset="0.42" stop-color="#6564ca"/>
      <stop offset="1" stop-color="#20217f"/>
    </linearGradient>
    <linearGradient id="flag" x1="0" y1="0" x2="1" y2="1">
