<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Pinball XP</title>
  <desc id="desc">Bola cromada, bumper iluminado y flippers azul y verde con estética Windows XP.</desc>
  <defs>
    <linearGradient id="cabinet" x1="35" y1="18" x2="221" y2="235" gradientUnits="userSpaceOnUse">
      <stop stop-color="#134d9e"/>
      <stop offset="0.5" stop-color="#082968"/>
      <stop offset="1" stop-color="#03143e"/>
    </linearGradient>
    <radialGradient id="ball" cx="0" cy="0" r="1" gradientTransform="translate(158 62) rotate(48) scale(79)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff"/>
      <stop offset="0.18" stop-color="#e9eff9"/>
      <stop offset="0.46" stop-color="#8b9bb7"/>
      <stop offset="0.74" stop-color="#344865"/>
      <stop offset="1" stop-color="#0e1b31"/>
    </radialGradient>
    <radialGradient id="bumper" cx="0" cy="0" r="1" gradientTransform="translate(83 105) rotate(46) scale(57)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#edffb7"/>
      <stop offset="0.24" stop-color="#76f06f"/>
      <stop offset="0.62" stop-color="#1a9a4e"/>
      <stop offset="1" stop-color="#07522f"/>
    </radialGradient>
    <linearGradient id="leftFlipper" x1="38" y1="184" x2="126" y2="218" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9cecff"/>
      <stop offset="0.46" stop-color="#3fa6f4"/>
      <stop offset="1" stop-color="#1760bd"/>
    </linearGradient>
    <linearGradient id="rightFlipper" x1="218" y1="184" x2="130" y2="218" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c9ff7c"/>
      <stop offset="0.46" stop-color="#66db54"/>
      <stop offset="1" stop-color="#258c3c"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="170%" height="180%">
      <feDropShadow dx="0" dy="9" stdDeviation="8" flood-color="#001033" flood-opacity="0.48"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <path d="M44 28c0-10 8-18 18-18h132c10 0 18 8 18 18l18 186c1 12-8 22-20 22H46c-12 0-21-10-20-22z" fill="url(#cabinet)" stroke="#102c65" stroke-width="6"/>
    <path d="M57 31h139l14 169H43z" fill="none" stroke="#74b8ff" stroke-width="4" opacity="0.72"/>
    <path d="M67 45h119M54 164h150" stroke="#3a7bd4" stroke-width="3" opacity="0.45"/>

    <g transform="translate(81 109)" filter="url(#glow)">
      <circle r="43" fill="#69ef72" opacity="0.24"/>
      <circle r="32" fill="url(#bumper)" stroke="#d9ffd3" stroke-width="5"/>
      <circle r="21" fill="none" stroke="#eaff9a" stroke-width="5" opacity="0.78"/>
      <circle cx="-10" cy="-12" r="7" fill="#fff" opacity="0.8"/>
    </g>

    <g transform="translate(169 76)">
      <circle r="45" fill="url(#ball)" stroke="#d8e2ef" stroke-width="4"/>
      <ellipse cx="-16" cy="-17" rx="13" ry="9" fill="#fff" opacity="0.92" transform="rotate(-28)"/>
      <path d="M17 13c-7 12-17 20-31 24" fill="none" stroke="#d9e3f4" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
    </g>

    <g>
      <path d="M39 187c-5 2-7 8-4 13l7 12c3 5 8 7 13 4l73-25c7-3 9-12 4-17l-6-6c-3-3-8-4-12-2z" fill="url(#leftFlipper)" stroke="#e4fbff" stroke-width="5" stroke-linejoin="round"/>
      <circle cx="48" cy="200" r="9" fill="#d9f8ff" stroke="#1556a9" stroke-width="4"/>
      <path d="M217 187c5 2 7 8 4 13l-7 12c-3 5-8 7-13 4l-73-25c-7-3-9-12-4-17l6-6c3-3 8-4 12-2z" fill="url(#rightFlipper)" stroke="#eeffd4" stroke-width="5" stroke-linejoin="round"/>
      <circle cx="208" cy="200" r="9" fill="#edffd3" stroke="#237b37" stroke-width="4"/>
    </g>

    <circle cx="128" cy="226" r="11" fill="#07112e" stroke="#4c78bd" stroke-width="4"/>
    <path d="M122 220l12 12M134 220l-12 12" stroke="#76d7ff" stroke-width="3" opacity="0.8"/>
  </g>
</svg>
